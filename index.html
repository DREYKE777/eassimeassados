<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eassados Espetinhos | Premium Cardápio</title>
    
    <!-- Google Fonts: Poppins para leitura e Playfair para elegância -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Iconografia Profissional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Biblioteca de Animações -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --primary-dark: #b91c1c;
            --secondary: #1d3557;
            --accent: #f1faee;
            --dark: #070707;
            --card-bg: rgba(20, 20, 20, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --transition-smooth: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(230, 57, 70, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(29, 53, 87, 0.1) 0%, transparent 40%),
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.92)), 
                url('eassim1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--accent);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* --- Header & Logo --- */
        .header-top {
            padding: 60px 20px 40px;
            text-align: center;
            position: relative;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-wrap::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .main-logo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.3);
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            line-height: 1;
        }

        .hero-subtitle {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--primary);
            margin-top: 10px;
        }

        /* --- Cardápio Section --- */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #fff;
        }

        .menu-preview {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 50px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .menu-preview:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 45px rgba(230, 57, 70, 0.2);
        }

        .menu-preview img { width: 100%; display: block; }

        /* --- Filtros Estilizados --- */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn i { font-size: 0.8rem; opacity: 0.6; }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
            transform: translateY(-2px);
        }

        /* --- Grid de Produtos --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: var(--transition-smooth);
        }

        .product-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(230, 57, 70, 0.3);
            transform: translateX(10px);
        }

        .product-card:hover::before { transform: scaleY(1); }

        .product-info h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .product-info p {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 12px;
            max-width: 220px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(230, 57, 70, 0.2);
        }

        .add-btn:hover {
            background: #fff;
            color: var(--primary);
            transform: scale(1.1) rotate(90deg);
        }

        /* --- Carrinho & Checkout --- */
        .cart-trigger {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 75px;
            height: 75px;
            background: var(--primary);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 15px 40px rgba(230, 57, 70, 0.4);
            transition: var(--transition-smooth);
        }

        .cart-trigger:hover { transform: scale(1.1) translateY(-5px); }

        .badge-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #fff;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 800;
            min-width: 28px;
            height: 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .side-cart {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: #0d0d0d;
            z-index: 2000;
            padding: 40px;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .side-cart.active { right: 0; }

        .cart-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cart-top h3 { font-family: 'Playfair Display'; font-size: 1.8rem; }

        .close-btn { font-size: 1.8rem; cursor: pointer; color: #555; transition: 0.3s; }
        .close-btn:hover { color: var(--primary); transform: rotate(90deg); }

        .cart-scroll { flex: 1; overflow-y: auto; padding-right: 10px; }

        .cart-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .cart-item:hover { border-color: var(--glass-border); }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 12px;
        }

        .qty-btn { cursor: pointer; color: var(--primary); font-size: 1.1rem; }

        .cart-summary {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #222;
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .whatsapp-btn {
            background: #25d366;
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-btn:hover { background: #1eb954; transform: translateY(-3px); }

        /* --- Success Modal --- */
        .modal-success {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-success.show { display: flex; }

        .success-card {
            background: #111;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            border: 1px solid var(--glass-border);
        }

        .success-icon {
            width: 100px; height: 100px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 3rem;
            color: white;
            box-shadow: 0 20px 40px rgba(230, 57, 70, 0.4);
        }

        /* --- Responsive Adjustments --- */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.8rem; }
            .glass-panel { padding: 30px 20px; border-radius: 30px; }
            .menu-grid { grid-template-columns: 1fr; }
            .cart-trigger { bottom: 20px; right: 20px; width: 65px; height: 65px; }
        }
    </style>
</head>
<body>

    <!-- Modal de Sucesso -->
    <div id="successModal" class="modal-success">
        <div class="success-card animate__animated animate__zoomIn">
            <div class="success-icon">
                <i class="fas fa-fire-alt"></i>
            </div>
            <h2 style="font-family: 'Playfair Display'; margin-bottom: 10px;">Pedido em Preparo!</h2>
            <p style="color: #777; margin-bottom: 30px;">O braseiro já está quente. Seu pedido foi enviado com sucesso.</p>
            <button onclick="closeModal()" class="whatsapp-btn" style="background: var(--primary)">Voltar ao Menu</button>
        </div>
    </div>

    <!-- Header & Logo -->
    <div class="header-top">
        <div class="logo-wrap animate__animated animate__fadeIn">
            <img src="eassimlogo.jpeg" alt="Eassados Logo" class="main-logo">
        </div>
        <h1 class="hero-title animate__animated animate__fadeInUp">Eassados Espetinhos</h1>
        <p class="hero-subtitle animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">Grelhados com Paixão</p>
    </div>

    <main class="main-container">
        <div class="glass-panel">
            <div class="section-header">
                <h2>Seu Cardápio Gourmet</h2>
                <div style="width: 40px; height: 2px; background: var(--primary); margin: 15px auto;"></div>
            </div>
            
            <!-- Imagem Estática com Zoom -->
            <div class="menu-preview animate__animated animate__fadeIn" style="animation-delay: 0.4s;">
                <img src="eassimcardapio.jpeg" alt="Menu Premium">
            </div>

            <!-- Filtros de Navegação -->
            <div class="filter-container animate__animated animate__fadeIn" style="animation-delay: 0.5s;">
                <button class="filter-btn active" onclick="filterItems('todos', this)">
                    <i class="fas fa-th-large"></i> Todos
                </button>
                <button class="filter-btn" onclick="filterItems('carne', this)">
                    <i class="fas fa-drumstick-bite"></i> Carnes
                </button>
                <button class="filter-btn" onclick="filterItems('especial', this)">
                    <i class="fas fa-star"></i> Especiais
                </button>
                <button class="filter-btn" onclick="filterItems('bebida', this)">
                    <i class="fas fa-wine-glass-alt"></i> Bebidas
                </button>
            </div>

            <!-- Grade Dinâmica de Itens -->
            <div class="menu-grid" id="menuGrid">
                <!-- Gerado via JS -->
            </div>
        </div>
    </main>

    <!-- Botão Flutuante do Carrinho -->
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <div class="badge-count" id="badgeCount">0</div>
    </div>

    <!-- Carrinho Lateral -->
    <div class="side-cart" id="sideCart">
        <div class="cart-top">
            <h3>Seu Pedido</h3>
            <div class="close-btn" onclick="toggleCart()"><i class="fas fa-times"></i></div>
        </div>
        
        <div class="cart-scroll" id="cartContent">
            <!-- Itens do Carrinho -->
        </div>
        
        <div class="cart-summary">
            <div class="total-box">
                <span>Total Braseiro</span>
                <span id="finalTotal" style="color: var(--primary);">R$ 0,00</span>
            </div>
            <button class="whatsapp-btn" onclick="sendOrder()">
                <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>

    <script>
        const menuData = [
            { id: 1, name: "Espeto de Alcatra", category: "carne", price: 12.00, desc: "Corte selecionado com tempero da casa." },
            { id: 2, name: "Contra-Filé Premium", category: "carne", price: 13.50, desc: "Sabor marcante com leve marmoreio." },
            { id: 3, name: "Coração de Frango", category: "carne", price: 11.00, desc: "O favorito, suculento e bem temperado." },
            { id: 4, name: "Linguiça Toscana", category: "carne", price: 9.50, desc: "Linguiça artesanal de alta qualidade." },
            { id: 5, name: "Lombo Suíno", category: "carne", price: 10.50, desc: "Temperado com limão e ervas finas." },
            { id: 6, name: "Medalhão de Frango", category: "especial", price: 15.50, desc: "Envolvido em bacon premium crocante." },
            { id: 7, name: "Medalhão de Alcatra", category: "especial", price: 17.00, desc: "Duo perfeito de carne e bacon." },
            { id: 8, name: "Pão de Alho Caseiro", category: "especial", price: 9.00, desc: "Cremosidade máxima e sabor intenso." },
            { id: 9, name: "Queijo Coalho", category: "especial", price: 12.50, desc: "Grelhado na hora com mel de engenho." },
            { id: 10, name: "Kafta Especial", category: "especial", price: 14.00, desc: "Carne moída com especiarias orientais." },
            { id: 11, name: "Heineken Long Neck", category: "bebida", price: 12.00, desc: "A cerveja premium bem gelada." },
            { id: 12, name: "Coca-Cola Original", category: "bebida", price: 6.00, desc: "Lata 350ml trincando." },
            { id: 13, name: "Suco de Laranja", category: "bebida", price: 8.50, desc: "Natural, feito na hora 300ml." },
            { id: 14, name: "Água sem Gás", category: "bebida", price: 4.50, desc: "Crystal 500ml." }
        ];

        let cart = [];

        function renderProducts(items) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            
            items.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="product-card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="product-info">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                            <div class="product-price">R$ ${item.price.toFixed(2)}</div>
                        </div>
                        <button class="add-btn" onclick="addToCart(${item.id})">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `;
            });
        }

        function filterItems(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(category === 'todos') {
                renderProducts(menuData);
            } else {
                const filtered = menuData.filter(i => i.category === category);
                renderProducts(filtered);
            }
        }

        function addToCart(id) {
            const product = menuData.find(p => p.id === id);
            const exists = cart.find(p => p.id === id);
            
            if(exists) {
                exists.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            
            updateCart();
            
            const trigger = document.querySelector('.cart-trigger');
            trigger.classList.add('animate__animated', 'animate__rubberBand');
            setTimeout(() => trigger.classList.remove('animate__animated', 'animate__rubberBand'), 600);
        }

        function updateCart() {
            const container = document.getElementById('cartContent');
            const badge = document.getElementById('badgeCount');
            const totalDisplay = document.getElementById('finalTotal');
            
            container.innerHTML = '';
            let total = 0;
            let totalQty = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px 0; opacity: 0.3;">
                        <i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <p>O braseiro está vazio.</p>
                    </div>
                `;
            }

            cart.forEach(item => {
                total += item.price * item.qty;
                totalQty += item.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:600; font-size: 0.95rem;">${item.name}</div>
                            <div style="font-size:0.8rem; color:var(--primary)">R$ ${item.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-controls">
                            <i class="fas fa-minus qty-btn" onclick="changeQty(${item.id}, -1)"></i>
                            <span style="font-weight:700; width: 20px; text-align:center">${item.qty}</span>
                            <i class="fas fa-plus qty-btn" onclick="changeQty(${item.id}, 1)"></i>
                        </div>
                    </div>
                `;
            });

            badge.innerText = totalQty;
            totalDisplay.innerText = `R$ ${total.toFixed(2)}`;
        }

        function changeQty(id, delta) {
            const index = cart.findIndex(p => p.id === id);
            if (index !== -1) {
                cart[index].qty += delta;
                if (cart[index].qty <= 0) cart.splice(index, 1);
            }
            updateCart();
        }

        function toggleCart() {
            document.getElementById('sideCart').classList.toggle('active');
        }

        function sendOrder() {
            if(cart.length === 0) return;
            
            let text = "*🔥 NOVO PEDIDO - EASSADOS ESPETINHOS* %0A%0A";
            cart.forEach(item => {
                text += `*${item.qty}x* ${item.name} - _R$ ${(item.price * item.qty).toFixed(2)}_ %0A`;
            });
            text += `%0A💰 *Total: ${document.getElementById('finalTotal').innerText}*`;
            text += `%0A%0A_Aguardando confirmação do braseiro..._`;
            
            window.open(`https://wa.me/5500000000000?text=${text}`);

            toggleCart();
            document.getElementById('successModal').classList.add('show');
            cart = [];
            updateCart();
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
        }

        window.onload = () => renderProducts(menuData);
    </script>
</body>
</html>
