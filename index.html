<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eassados Espetinhos | Premium Cardápio</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Iconografia -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Animações -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --primary-glow: rgba(230, 57, 70, 0.5);
            --secondary: #1d3557;
            --accent: #f1faee;
            --dark: #070707;
            --card-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(230, 57, 70, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(29, 53, 87, 0.12) 0%, transparent 40%),
                linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)), 
                url('eassim1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--accent);
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Header */
        .header-main {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            inset: -15px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse-ring 3s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .main-logo {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow);
            z-index: 2;
            position: relative;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-tag {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Menu Section */
        .content-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .menu-panel {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .menu-image-card {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .menu-image-card img { width: 100%; display: block; }

        /* Categorias */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* Grid de Itens */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .food-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 22px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition);
            position: relative;
        }

        .food-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .food-info h3 { font-size: 1.1rem; color: #fff; margin-bottom: 6px; }
        .food-info p { font-size: 0.8rem; color: #888; margin-bottom: 15px; min-height: 35px; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag { color: var(--primary); font-weight: 700; font-size: 1.2rem; }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            width: 42px; height: 42px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-add:hover { transform: scale(1.1) rotate(90deg); background: #fff; color: var(--primary); }

        /* Floating Cart Button */
        .cart-fab {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 70px; height: 70px;
            background: var(--primary);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 15px 30px var(--primary-glow);
            transition: var(--transition);
        }

        .cart-fab:hover { transform: translateY(-5px) scale(1.05); }

        .cart-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: #fff;
            color: var(--primary);
            font-weight: 800;
            font-size: 0.8rem;
            width: 26px; height: 26px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Cart Sidebar */
        .sidebar {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 400px;
            height: 100vh;
            background: #0a0a0a;
            z-index: 1001;
            padding: 40px 30px;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .sidebar.active { right: 0; }

        .side-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .side-header h2 { font-family: 'Playfair Display'; font-size: 1.8rem; }
        .close-side { font-size: 1.5rem; cursor: pointer; color: #444; }

        .cart-list { flex: 1; overflow-y: auto; }

        .cart-item {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 10px;
        }

        .qty-btn { cursor: pointer; color: var(--primary); font-size: 1rem; }

        .side-footer {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #222;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn-finish {
            background: #25d366;
            color: #fff;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-finish:hover { background: #1eb954; transform: translateY(-3px); }

        /* Success Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .overlay.active { display: flex; }

        /* Responsive */
        @media (max-width: 600px) {
            .menu-panel { padding: 25px 15px; border-radius: 25px; }
            .header-main { padding: 40px 10px; }
            .cart-fab { bottom: 20px; right: 20px; width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <!-- Overlay Pedido Enviado -->
    <div class="overlay" id="successOverlay">
        <div class="animate__animated animate__zoomIn">
            <div style="background: var(--primary); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2.5rem; color: white; box-shadow: 0 10px 30px var(--primary-glow);">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="font-family: 'Playfair Display'; margin-bottom: 10px;">Pedido a Caminho!</h2>
            <p style="color: #888; margin-bottom: 30px; padding: 0 20px;">Redirecionando para o nosso WhatsApp...</p>
            <button onclick="closeSuccess()" style="background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-weight: 600;">Ok, entendi</button>
        </div>
    </div>

    <header class="header-main">
        <div class="logo-container animate__animated animate__fadeIn">
            <img src="eassimlogo.jpeg" alt="Eassados Logo" class="main-logo">
        </div>
        <h1 class="hero-title animate__animated animate__fadeInUp">Eassados Espetinhos</h1>
        <p class="hero-tag animate__animated animate__fadeInUp">O Braseiro Mais Saboroso</p>
    </header>

    <main class="content-wrap">
        <div class="menu-panel">
            <div class="menu-image-card animate__animated animate__fadeIn" style="animation-delay: 0.3s;">
                <img src="eassimcardapio.jpeg" alt="Cardápio Oficial">
            </div>

            <div class="tabs animate__animated animate__fadeIn" style="animation-delay: 0.4s;">
                <button class="tab-btn active" onclick="filterItems('todos', this)">Todos</button>
                <button class="tab-btn" onclick="filterItems('carne', this)">Carnes</button>
                <button class="tab-btn" onclick="filterItems('especial', this)">Especiais</button>
                <button class="tab-btn" onclick="filterItems('bebida', this)">Bebidas</button>
            </div>

            <div class="items-grid" id="itemsGrid">
                <!-- Gerado por JS -->
            </div>
        </div>
    </main>

    <div class="cart-fab" onclick="toggleSidebar()">
        <i class="fas fa-shopping-basket"></i>
        <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="side-header">
            <h2>Seu Pedido</h2>
            <i class="fas fa-times close-side" onclick="toggleSidebar()"></i>
        </div>
        <div class="cart-list" id="cartList">
            <!-- Itens -->
        </div>
        <div class="side-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal" style="color: var(--primary);">R$ 0,00</span>
            </div>
            <button class="btn-finish" onclick="checkout()">
                <i class="fab fa-whatsapp"></i> Finalizar Pedido
            </button>
        </div>
    </aside>

    <script>
        const WHATSAPP_NUMBER = "14997574181";

        const menuItems = [
            { id: 1, name: "Espetinho de Alcatra", category: "carne", price: 12.00, desc: "Alcatra selecionada com tempero especial." },
            { id: 2, name: "Contra-Filé Premium", category: "carne", price: 13.50, desc: "Sabor marcante e textura macia." },
            { id: 3, name: "Coração de Frango", category: "carne", price: 11.00, desc: "Corações suculentos e bem dourados." },
            { id: 4, name: "Linguiça Toscana", category: "carne", price: 9.50, desc: "A clássica linguiça de pernil suíno." },
            { id: 5, name: "Medalhão de Frango", category: "especial", price: 15.00, desc: "Peito de frango envolto em bacon crocante." },
            { id: 6, name: "Pão de Alho Caseiro", category: "especial", price: 9.00, desc: "Pão crocante com recheio ultra cremoso." },
            { id: 7, name: "Queijo Coalho", category: "especial", price: 12.50, desc: "Grelhado na hora com orégano." },
            { id: 8, name: "Kafta Premium", category: "especial", price: 14.00, desc: "Carne moída temperada com hortelã." },
            { id: 9, name: "Heineken Long Neck", category: "bebida", price: 12.00, desc: "Cerveja gelada no ponto." },
            { id: 10, name: "Coca-Cola (Lata)", category: "bebida", price: 6.00, desc: "Lata 350ml bem gelada." },
            { id: 11, name: "Água Mineral", category: "bebida", price: 4.50, desc: "Garrafa 500ml." },
            { id: 12, name: "Suco Natural", category: "bebida", price: 8.50, desc: "Laranja ou Limonada fresca." }
        ];

        let cart = [];

        function renderItems(items) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            items.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="food-item animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="food-info">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <div class="price-row">
                            <span class="price-tag">R$ ${item.price.toFixed(2)}</span>
                            <button class="btn-add" onclick="addToCart(${item.id})">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function filterItems(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(category === 'todos') {
                renderItems(menuItems);
            } else {
                renderItems(menuItems.filter(i => i.category === category));
            }
        }

        function addToCart(id) {
            const product = menuItems.find(p => p.id === id);
            const exists = cart.find(p => p.id === id);
            if(exists) {
                exists.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            updateCart();
            
            // Efeito no botão
            const fab = document.querySelector('.cart-fab');
            fab.classList.add('animate__animated', 'animate__bounceIn');
            setTimeout(() => fab.classList.remove('animate__animated', 'animate__bounceIn'), 500);
        }

        function changeQty(id, delta) {
            const item = cart.find(p => p.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(p => p.id !== id);
            }
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            const badge = document.getElementById('cartBadge');
            const totalDisplay = document.getElementById('cartTotal');
            
            list.innerHTML = '';
            let total = 0;
            let qty = 0;

            if(cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding: 40px; color: #555;">Sua sacola está vazia.</p>`;
            }

            cart.forEach(item => {
                total += item.price * item.qty;
                qty += item.qty;
                list.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:600; font-size: 0.9rem;">${item.name}</div>
                            <div style="color: var(--primary); font-size: 0.8rem;">R$ ${item.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-box">
                            <i class="fas fa-minus qty-btn" onclick="changeQty(${item.id}, -1)"></i>
                            <span style="font-weight:700; min-width: 15px; text-align:center">${item.qty}</span>
                            <i class="fas fa-plus qty-btn" onclick="changeQty(${item.id}, 1)"></i>
                        </div>
                    </div>
                `;
            });

            badge.innerText = qty;
            totalDisplay.innerText = `R$ ${total.toFixed(2)}`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function checkout() {
            if(cart.length === 0) return;

            let message = "*🔥 NOVO PEDIDO - EASSADOS ESPETINHOS*%0A%0A";
            cart.forEach(item => {
                message += `• *${item.qty}x* ${item.name} - _R$ ${(item.price * item.qty).toFixed(2)}_%0A`;
            });
            message += `%0A💰 *TOTAL DO PEDIDO: ${document.getElementById('cartTotal').innerText}*%0A%0A_Favor confirmar o recebimento e tempo de entrega._`;

            // Abre o WhatsApp
            window.open(`https://wa.me/55${WHATSAPP_NUMBER}?text=${message}`);

            // Mostra sucesso
            document.getElementById('successOverlay').classList.add('active');
            
            // Reseta
            cart = [];
            updateCart();
            toggleSidebar();
        }

        function closeSuccess() {
            document.getElementById('successOverlay').classList.remove('active');
        }

        window.onload = () => renderItems(menuItems);
    </script>
</body>
</html>
