<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eassados Espetinhos | Cardápio Premium</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #e63946;
            --primary-dark: #b91c1c;
            --secondary: #1d3557;
            --accent: #f1faee;
            --dark: #070707;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(230, 57, 70, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(29, 53, 87, 0.15) 0%, transparent 40%),
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                url('eassim1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--accent);
            overflow-x: hidden;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* --- Header --- */
        header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.4);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15px;
        }

        .hero-tagline {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* --- Container Principal --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .card-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #fff;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: var(--primary);
            margin: 15px auto;
            border-radius: 2px;
        }

        .static-menu-img {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 50px;
            display: block;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transition: var(--transition);
            cursor: pointer;
        }

        .static-menu-img:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(230, 57, 70, 0.2);
        }

        /* --- Filtros --- */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(230, 57, 70, 0.3);
            transform: translateY(-3px);
        }

        /* --- Menu Grid --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(10px);
            border-color: rgba(230, 57, 70, 0.4);
        }

        .item-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 4px; height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: var(--transition);
        }

        .item-card:hover::before { transform: scaleY(1); }

        .item-info h3 { font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .item-info p { font-size: 0.85rem; color: #888; margin-bottom: 12px; line-height: 1.4; max-width: 200px; }
        .item-price { font-weight: 700; color: var(--primary); font-size: 1.3rem; }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2);
        }

        .add-btn:hover {
            background: #fff;
            color: var(--primary);
            transform: scale(1.1) rotate(90deg);
        }

        /* --- Carrinho --- */
        .cart-fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 75px;
            height: 75px;
            background: var(--primary);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 15px 40px rgba(230, 57, 70, 0.4);
            transition: var(--transition);
        }

        .cart-fab:hover { transform: scale(1.1) translateY(-5px); }

        .cart-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #fff;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 800;
            width: 30px;
            height: 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cart-side {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: #0a0a0a;
            z-index: 2000;
            padding: 40px;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .cart-side.active { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cart-header h3 { font-family: 'Playfair Display'; font-size: 2rem; }
        .close-cart { font-size: 1.8rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .close-cart:hover { opacity: 1; color: var(--primary); }

        .cart-list { flex: 1; overflow-y: auto; padding-right: 10px; }

        .cart-row {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 12px;
        }

        .qty-btn { color: var(--primary); cursor: pointer; font-size: 1rem; }

        .cart-footer {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #222;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .btn-finish {
            background: #25d366;
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .btn-finish:hover { background: #1eb954; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }

        /* --- Sucesso --- */
        .modal-success {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-success.active { display: flex; }

        .success-box {
            text-align: center;
            background: #111;
            padding: 50px;
            border-radius: 40px;
            max-width: 450px;
            border: 1px solid var(--glass-border);
        }

        .success-icon {
            width: 90px; height: 90px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 15px 30px rgba(230, 57, 70, 0.4);
        }

        @media (max-width: 768px) {
            .glass-card { padding: 30px 15px; border-radius: 30px; }
            .menu-grid { grid-template-columns: 1fr; }
            .cart-fab { bottom: 20px; right: 20px; width: 65px; height: 65px; }
        }
    </style>
</head>
<body>

    <div id="successModal" class="modal-success">
        <div class="success-box animate__animated animate__zoomIn">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="font-family: 'Playfair Display'; margin-bottom: 15px;">Pedido Enviado!</h2>
            <p style="color: #777; margin-bottom: 35px;">Seu pedido foi encaminhado para o nosso WhatsApp. Prepare o apetite!</p>
            <button onclick="closeModal()" class="btn-finish" style="background: var(--primary)">Voltar ao Menu</button>
        </div>
    </div>

    <header>
        <div class="logo-container animate__animated animate__fadeIn">
            <img src="eassimlogo.jpeg" alt="Eassados Logo" class="main-logo">
        </div>
        <h1 class="hero-title animate__animated animate__fadeInUp">Eassados Espetinhos</h1>
        <p class="hero-tagline animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">Grelhados na Hora</p>
    </header>

    <main class="container">
        <div class="glass-card">
            <div class="card-header">
                <h2>O Nosso Cardápio</h2>
                <div class="divider"></div>
            </div>

            <img src="eassimcardapio.jpeg" alt="Cardápio" class="static-menu-img animate__animated animate__fadeIn" style="animation-delay: 0.4s;">

            <div class="filters animate__animated animate__fadeIn" style="animation-delay: 0.5s;">
                <button class="filter-btn active" onclick="filterItems('todos', this)"><i class="fas fa-th"></i> Todos</button>
                <button class="filter-btn" onclick="filterItems('carne', this)"><i class="fas fa-drumstick-bite"></i> Carnes</button>
                <button class="filter-btn" onclick="filterItems('especial', this)"><i class="fas fa-fire"></i> Especiais</button>
                <button class="filter-btn" onclick="filterItems('bebida', this)"><i class="fas fa-beer"></i> Bebidas</button>
            </div>

            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </main>

    <div class="cart-fab" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <div class="cart-side" id="cartSide">
        <div class="cart-header">
            <h3>Seu Pedido</h3>
            <div class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></div>
        </div>

        <div class="cart-list" id="cartContent"></div>

        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotalText" style="color: var(--primary);">R$ 0,00</span>
            </div>
            <button class="btn-finish" onclick="checkout()">
                <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>

    <script>
        const menuItems = [
            { id: 1, name: "Espeto de Alcatra", category: "carne", price: 12.00, desc: "Alcatra suculenta temperada no sal grosso." },
            { id: 2, name: "Espeto de Contra-Filé", category: "carne", price: 13.50, desc: "Corte premium com leve gordura lateral." },
            { id: 3, name: "Coração de Frango", category: "carne", price: 11.00, desc: "Tradicional e bem passado no braseiro." },
            { id: 4, name: "Espeto de Linguiça", category: "carne", price: 9.50, desc: "Linguiça artesanal suína de alta qualidade." },
            { id: 5, name: "Medalhão de Frango", category: "especial", price: 15.00, desc: "Peito de frango envolto em bacon crocante." },
            { id: 6, name: "Pão de Alho Gourmet", category: "especial", price: 9.00, desc: "Cremosidade sem igual, assado na hora." },
            { id: 7, name: "Queijo Coalho", category: "especial", price: 12.00, desc: "Grelhado com orégano e mel opcional." },
            { id: 8, name: "Kafta Especial", category: "especial", price: 14.00, desc: "Carne moída temperada com hortelã e especiarias." },
            { id: 9, name: "Heineken Long Neck", category: "bebida", price: 12.00, desc: "Cerveja premium super gelada." },
            { id: 10, name: "Coca-Cola Lata", category: "bebida", price: 6.00, desc: "350ml trincando." },
            { id: 11, name: "Suco de Laranja", category: "bebida", price: 8.00, desc: "Natural e gelado." }
        ];

        let cart = [];
        const WHATSAPP_NUMBER = "5514997574185";

        function renderItems(items) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            items.forEach((item, index) => {
                grid.innerHTML += `
                    <div class="item-card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                            <div class="item-price">R$ ${item.price.toFixed(2)}</div>
                        </div>
                        <button class="add-btn" onclick="addToCart(${item.id})">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `;
            });
        }

        function filterItems(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'todos') renderItems(menuItems);
            else renderItems(menuItems.filter(i => i.category === cat));
        }

        function addToCart(id) {
            const product = menuItems.find(p => p.id === id);
            const exists = cart.find(p => p.id === id);
            if(exists) exists.qty++;
            else cart.push({...product, qty: 1});
            updateCart();
            
            const fab = document.querySelector('.cart-fab');
            fab.classList.add('animate__animated', 'animate__rubberBand');
            setTimeout(() => fab.classList.remove('animate__animated', 'animate__rubberBand'), 600);
        }

        function updateCart() {
            const content = document.getElementById('cartContent');
            const badge = document.getElementById('cartBadge');
            const totalText = document.getElementById('cartTotalText');
            
            content.innerHTML = '';
            let total = 0;
            let qtyTotal = 0;

            if(cart.length === 0) {
                content.innerHTML = `<div style="text-align:center; padding: 40px; opacity: 0.3"><i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom:15px"></i><p>Carrinho vazio</p></div>`;
            }

            cart.forEach(item => {
                total += item.price * item.qty;
                qtyTotal += item.qty;
                content.innerHTML += `
                    <div class="cart-row animate__animated animate__fadeIn">
                        <div>
                            <div style="font-weight:600; font-size: 0.95rem;">${item.name}</div>
                            <div style="font-size:0.8rem; color:var(--primary)">R$ ${item.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-box">
                            <i class="fas fa-minus qty-btn" onclick="changeQty(${item.id}, -1)"></i>
                            <span style="font-weight:700; width: 20px; text-align:center">${item.qty}</span>
                            <i class="fas fa-plus qty-btn" onclick="changeQty(${item.id}, 1)"></i>
                        </div>
                    </div>
                `;
            });

            badge.innerText = qtyTotal;
            totalText.innerText = `R$ ${total.toFixed(2)}`;
        }

        function changeQty(id, delta) {
            const idx = cart.findIndex(p => p.id === id);
            if(idx !== -1) {
                cart[idx].qty += delta;
                if(cart[idx].qty <= 0) cart.splice(idx, 1);
            }
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cartSide').classList.toggle('active');
        }

        function checkout() {
            if(cart.length === 0) return;
            
            let msg = "*🔥 NOVO PEDIDO - EASSADOS ESPETINHOS*%0A%0A";
            cart.forEach(item => {
                msg += `*${item.qty}x* ${item.name} - _R$ ${(item.price * item.qty).toFixed(2)}_%0A`;
            });
            msg += `%0A💰 *TOTAL: ${document.getElementById('cartTotalText').innerText}*%0A%0A_Aguardando confirmação..._`;
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`);

            document.getElementById('successModal').classList.add('active');
            cart = [];
            updateCart();
            toggleCart();
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        window.onload = () => renderItems(menuItems);
    </script>
</body>
</html>
